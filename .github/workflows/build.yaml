        isaacsim-base-image: ${{ env.ISAACSIM_BASE_IMAGE }}
        isaacsim-version: ${{ env.ISAACSIM_BASE_VERSION }}
        filter-pattern: "not isaaclab_"
        shard-index: "0"
        shard-count: "3"
        container-name: isaac-lab-core-1-test

