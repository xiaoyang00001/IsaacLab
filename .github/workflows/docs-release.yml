name: Docs (release)

on:
  push:
    branches:
      - main
      - 'release/**'
    tags:
      - 'v[1-9]*'
  pull_request:
    branches:
      - main
      - 'release/**'
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-secrets:
    name: Check Secrets
    runs-on: ubuntu-latest
    outputs:
      trigger-deploy: ${{ steps.trigger-deploy.outputs.defined }}

    steps:
    - id: trigger-deploy
      env:
        REPO_NAME: ${{ secrets.REPO_NAME }}
      if: >-
        github.repository == env.REPO_NAME &&
        (
          github.ref == 'refs/heads/main' ||
          startsWith(github.ref, 'refs/heads/release/') ||
          startsWith(github.ref, 'refs/tags/v')
        )
      run: echo "defined=true" >> "$GITHUB_OUTPUT"

  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Setup python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      with:
        python-version: "3.12"
        architecture: x64

    - name: Determine version slug
      id: slug
      env:
        REF: ${{ github.ref }}
      run: |
        if [[ "$REF" == refs/tags/* ]]; then
          SLUG="${REF#refs/tags/}"
        elif [[ "$REF" == refs/heads/* ]]; then
          SLUG="${REF#refs/heads/}"
          SLUG="${SLUG//\//-}"
        fi
        # For PRs, SLUG remains unset — conf.py falls back to VERSION file.
        if [ -n "$SLUG" ]; then
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
        fi

    - name: Install dev requirements
      working-directory: ./docs
      run: pip install -r requirements.txt

    - name: Build docs
      working-directory: ./docs
      env:
        DOCS_VERSION_SLUG: ${{ steps.slug.outputs.slug }}
      run: make current-docs

    - name: Upload docs artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
      with:
        name: docs-html
        path: ./docs/_build

  deploy-docs:
    name: Deploy Docs
    runs-on: ubuntu-latest
    needs: [check-secrets, build-docs]
    if: needs.check-secrets.outputs.trigger-deploy == 'true'
    permissions:
      contents: write
    # Serialize deploys to avoid race conditions on versions.json.
    concurrency:
      group: docs-deploy-gh-pages
      cancel-in-progress: false

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        sparse-checkout: |
          docs/_static/version-switcher.js
          docs/_redirect/index.html

    - name: Download docs artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: docs-html
        path: ./artifact

    - name: Determine version slug
      id: slug
      env:
        REF: ${{ github.ref }}
      run: |
        if [[ "$REF" == refs/tags/* ]]; then
          SLUG="${REF#refs/tags/}"
        elif [[ "$REF" == refs/heads/* ]]; then
          SLUG="${REF#refs/heads/}"
          SLUG="${SLUG//\//-}"
        fi
        if [ -z "$SLUG" ]; then
          echo "::error::Could not determine version slug from ref: $REF"
          exit 1
        fi
        echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
        echo "Version slug: $SLUG"

    - name: Assemble deploy directory
      env:
        SLUG: ${{ steps.slug.outputs.slug }}
        REF: ${{ github.ref }}
      run: |
        mkdir -p site

        # Copy built docs into versioned subdirectory
        cp -r artifact/current "site/${SLUG}"

        # Inject version-switcher.js into every HTML file
        find "site/${SLUG}" -name "*.html" -exec sed -i \
          's|</body>|<script src="/IsaacLab/version-switcher.js"></script></body>|' {} +

        # Verify injection
        TOTAL=$(find "site/${SLUG}" -name "*.html" | wc -l)
        INJECTED=$(grep -rl 'version-switcher.js' "site/${SLUG}" --include="*.html" | wc -l)
        echo "Injected version-switcher.js into ${INJECTED}/${TOTAL} HTML files"
        if [ "$TOTAL" -gt 0 ] && [ "$INJECTED" -ne "$TOTAL" ]; then
          echo "::warning::version-switcher.js injection missed $((TOTAL - INJECTED)) of ${TOTAL} HTML files"
        fi

        # Copy version-switcher.js to site root
        cp docs/_static/version-switcher.js site/version-switcher.js

        # For tag deploys: create /stable/ alias and redirect root to it
        if [[ "$REF" == refs/tags/* ]]; then
          echo "Tag deploy detected — creating /stable/ alias"
          cp -r "site/${SLUG}" "site/stable"
          cat > site/index.html << 'HTMLEOF'
        <!DOCTYPE html>
        <html>
          <head>
            <title>Redirecting to the latest Isaac Lab documentation</title>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=./stable/index.html">
            <link rel="canonical" href="https://isaac-sim.github.io/IsaacLab/stable/">
          </head>
          <body>
            <p>Redirecting to <a href="./stable/index.html">Isaac Lab documentation</a>...</p>
          </body>
        </html>
        HTMLEOF
        fi

    - name: Update versions.json
      env:
        SLUG: ${{ steps.slug.outputs.slug }}
        GH_REPO: ${{ github.repository }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Fetch existing versions.json from gh-pages branch (avoids CDN cache).
        if gh api "repos/${GH_REPO}/contents/versions.json?ref=gh-pages" \
             --jq '.content' 2>/dev/null | base64 -d > existing.json 2>/dev/null; then
          echo "Fetched existing versions.json from gh-pages branch"
        else
          echo "[]" > existing.json
          echo "No existing versions.json, starting fresh"
        fi

        # Upsert this version's entry
        python3 << 'PYEOF'
        import json, os, sys

        slug = os.environ.get('SLUG', '')
        if not slug:
            print('::error::SLUG environment variable is empty')
            sys.exit(1)

        try:
            with open('existing.json') as f:
                versions = json.load(f)
        except json.JSONDecodeError as e:
            print(f'::warning::existing.json contains invalid JSON: {e}')
            versions = []

        if not isinstance(versions, list):
            print(f'::warning::versions.json was not an array (got {type(versions).__name__}), resetting')
            versions = []

        # Remove existing entry for this slug
        versions = [v for v in versions if isinstance(v, dict) and v.get('version') != slug]

        # Add updated entry
        versions.append({
            'name': slug,
            'version': slug,
            'url': '/IsaacLab/' + slug + '/',
        })

        # Sort: branches first (main, develop), then releases, then tags
        def sort_key(v):
            s = v['version']
            if s == 'main':
                return (0, s)
            elif s == 'develop':
                return (1, s)
            elif s.startswith('release-'):
                return (2, s)
            else:
                return (3, s)

        versions.sort(key=sort_key)

        with open('site/versions.json', 'w') as f:
            json.dump(versions, f, indent=2)
            f.write('\n')
        PYEOF

        echo "Updated versions.json:"
        cat site/versions.json

    - name: Deploy to gh-pages
      uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e  # v4.0.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./site
        keep_files: true
