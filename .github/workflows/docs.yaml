name: Docs

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
    tags:
      - 'v[1-9]*'
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-secrets:
    name: Check Secrets
    runs-on: ubuntu-latest
    outputs:
      trigger-deploy: ${{ steps.trigger-deploy.outputs.defined }}
    steps:
    - id: trigger-deploy
      env:
        REPO_NAME: ${{ secrets.REPO_NAME }}
      if: >-
        github.repository == env.REPO_NAME &&
        (
          github.ref == 'refs/heads/main' ||
          github.ref == 'refs/heads/develop' ||
          startsWith(github.ref, 'refs/heads/release/') ||
          startsWith(github.ref, 'refs/tags/v')
        )
      run: echo "defined=true" >> "$GITHUB_OUTPUT"

  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        architecture: x64

    - name: Determine version slug
      id: slug
      run: |
        REF="${{ github.ref }}"
        if [[ "$REF" == refs/tags/* ]]; then
          SLUG="${REF#refs/tags/}"
        elif [[ "$REF" == refs/heads/* ]]; then
          SLUG="${REF#refs/heads/}"
          SLUG="${SLUG//\//-}"
        else
          SLUG=""
        fi
        echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

    - name: Install dev requirements
      working-directory: ./docs
      run: pip install -r requirements.txt

    - name: Build docs
      working-directory: ./docs
      env:
        DOCS_VERSION_SLUG: ${{ steps.slug.outputs.slug }}
      run: make current-docs

    - name: Upload docs artifact
      uses: actions/upload-artifact@v7
      with:
        name: docs-html
        path: ./docs/_build

  deploy-docs:
    name: Deploy Docs
    runs-on: ubuntu-latest
    needs: [check-secrets, build-docs]
    if: needs.check-secrets.outputs.trigger-deploy == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        sparse-checkout: |
          docs/_static/version-switcher.js
          docs/_redirect/index.html

    - name: Download docs artifact
      uses: actions/download-artifact@v8
      with:
        name: docs-html
        path: ./artifact

    - name: Determine version slug
      id: slug
      run: |
        REF="${{ github.ref }}"
        if [[ "$REF" == refs/tags/* ]]; then
          SLUG="${REF#refs/tags/}"
        elif [[ "$REF" == refs/heads/* ]]; then
          SLUG="${REF#refs/heads/}"
          SLUG="${SLUG//\//-}"
        fi
        echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
        echo "Version slug: $SLUG"

    - name: Assemble deploy directory
      env:
        SLUG: ${{ steps.slug.outputs.slug }}
      run: |
        mkdir -p site

        # Copy built docs into versioned subdirectory
        cp -r artifact/current "site/${SLUG}"

        # Inject version-switcher.js into every HTML file
        find "site/${SLUG}" -name "*.html" -exec sed -i \
          's|</body>|<script src="/IsaacLab/version-switcher.js"></script></body>|' {} +

        # Copy static assets to site root
        cp docs/_static/version-switcher.js site/version-switcher.js
        cp docs/_redirect/index.html site/index.html

    - name: Update versions.json
      env:
        SLUG: ${{ steps.slug.outputs.slug }}
      run: |
        # Fetch existing versions.json from gh-pages (may not exist yet)
        PAGES_URL="https://isaac-sim.github.io/IsaacLab/versions.json"
        if curl -sf "$PAGES_URL" -o existing.json; then
          echo "Fetched existing versions.json"
        else
          echo "[]" > existing.json
          echo "No existing versions.json, starting fresh"
        fi

        # Determine display name
        REF="${{ github.ref }}"
        if [[ "$REF" == refs/tags/* ]]; then
          NAME="${SLUG}"
        else
          NAME="${SLUG}"
        fi

        # Upsert this version's entry
        python3 -c "
        import json, sys

        slug = '${SLUG}'
        name = '${NAME}'

        with open('existing.json') as f:
            versions = json.load(f)

        # Remove existing entry for this slug
        versions = [v for v in versions if v['version'] != slug]

        # Add updated entry
        entry = {
            'name': name,
            'version': slug,
            'url': '/IsaacLab/' + slug + '/',
        }
        versions.append(entry)

        # Sort: branches first (main, develop), then releases, then tags by version
        def sort_key(v):
            s = v['version']
            if s == 'main':
                return (0, s)
            elif s == 'develop':
                return (1, s)
            elif s.startswith('release-'):
                return (2, s)
            else:
                return (3, s)

        versions.sort(key=sort_key)

        with open('site/versions.json', 'w') as f:
            json.dump(versions, f, indent=2)
            f.write('\n')
        "

        echo "Updated versions.json:"
        cat site/versions.json

    - name: Deploy to gh-pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./site
        keep_files: true
